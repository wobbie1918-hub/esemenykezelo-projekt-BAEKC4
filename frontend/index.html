<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eseménykezelő</title>
    <style>
        /* CSS alapok a reszponzív megjelenéshez (Flexbox/Grid előkészítés) */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background-color: #f4f4f9;
            color: #333;
        }
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .event-card { 
            background: white;
            border: 1px solid #ddd; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>Események böngészése</h1>
    
    <div id="events-container" class="events-grid">
        <p>Események betöltése folyamatban...</p>
    </div>

    <script>
        // HTTP hívás a backend végponthoz
        fetch('http://localhost:3000/api/events')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('events-container');
                container.innerHTML = ''; // Töröljük a "betöltés" szöveget
                
                // Végigmegyünk az adatbázisból kapott eseményeken
                data.forEach(event => {
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.innerHTML = `
                        <h2>${event.title}</h2>
                        <p>${event.description}</p>
                        <p><strong>📅 Dátum:</strong> ${event.event_date}</p>
                        <p><strong>👥 Férőhely:</strong> ${event.capacity} fő</p>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Hiba a betöltéskor:', error);
                document.getElementById('events-container').innerHTML = '<p>Hiba történt a szerverhez való csatlakozáskor.</p>';
            });
    </script>
</body>
</html>
