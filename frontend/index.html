<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAEKC4</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            /* Elegáns, halvány színátmenetes háttér */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            color: #2d3748; 
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 2.5rem;
            color: #1a202c;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: 1.5rem;
            color: #4a5568;
            margin-bottom: 20px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 10px;
        }

        /* --- KÁRTYÁK (CARDS) --- */
        .card { 
            background: rgba(255, 255, 255, 0.95); 
            border: none; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            /* Betöltési animáció hivatkozása */
            animation: fadeInUp 0.6s ease-out backwards;
        }

        /* Hover effekt a kártyákon: finoman felemelkedik */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .card.pending { 
            border-left: 6px solid #f6ad55; 
            background-color: #fffaf0;
        }

        .events-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; 
            margin-top: 20px; 
        }

        /* --- ŰRLAPOK ÉS BEVITELI MEZŐK --- */
        input, select { 
            width: 100%; 
            padding: 12px 15px; 
            margin-top: 8px; 
            margin-bottom: 15px;
            box-sizing: border-box; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background-color: #f7fafc;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        /* --- GOMBOK --- */
        button { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Különleges gomb színek */
        .btn-danger { background: linear-gradient(135deg, #fc8181 0%, #e53e3e 100%); box-shadow: 0 4px 15px rgba(229, 62, 62, 0.3); }
        .btn-danger:hover { background: linear-gradient(135deg, #e53e3e 0%, #fc8181 100%); }
        
        .btn-success { background: linear-gradient(135deg, #68d391 0%, #38a169 100%); box-shadow: 0 4px 15px rgba(56, 161, 105, 0.3); }
        .btn-success:hover { background: linear-gradient(135deg, #38a169 0%, #68d391 100%); }
        
        .btn-info { background: linear-gradient(135deg, #4fd1c5 0%, #319795 100%); box-shadow: 0 4px 15px rgba(49, 151, 149, 0.3); }
        .btn-info:hover { background: linear-gradient(135deg, #319795 0%, #4fd1c5 100%); }

        /* --- SZEKCIÓK --- */
        .auth-container { display: flex; flex-wrap: wrap; gap: 25px; margin-bottom: 40px; }
        .auth-box { flex: 1; min-width: 300px; }
        
        #user-info { 
            display: none; 
            background: linear-gradient(135deg, #c6f6d5 0%, #9ae6b4 100%); 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 30px; 
            color: #22543d; 
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .hidden { display: none !important; }

        .details-box {
            margin-top: 15px; 
            padding: 15px; 
            background: #f7fafc; 
            border-radius: 8px;
            border-left: 4px solid #667eea;
            font-size: 0.9rem;
            color: #4a5568;
            animation: fadeIn 0.3s ease;
        }

        /* --- ANIMÁCIÓK KULCSKOCKÁI --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Görgessünk sáv dizájn */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0aec0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎟️ BAEKC4</h1>

        <div id="user-info" class="hidden">
            <span id="welcome-text"></span>
            <button onclick="logout()" style="width: auto; margin: 0; background: linear-gradient(135deg, #a0aec0 0%, #718096 100%); box-shadow: none;">Kijelentkezés</button>
        </div>
        
        <div class="auth-container" id="auth-section">
            <div class="card auth-box">
                <h2>✨ Regisztráció</h2>
                <form id="register-form">
                    <input type="text" id="reg-name" placeholder="Teljes név" required>
                    <input type="email" id="reg-email" placeholder="E-mail cím" required>
                    <input type="password" id="reg-password" placeholder="Jelszó" required>
                    <select id="reg-role" onchange="toggleAdminCode()">
                        <option value="user">Sima felhasználó</option>
                        <option value="admin">Adminisztrátor</option>
                    </select>
                    <input type="password" id="reg-admin-code" placeholder="Titkos Admin Kód (titkoskod123)" class="hidden">
                    <button type="submit">Regisztrálok</button>
                </form>
            </div>
            <div class="card auth-box">
                <h2>👋 Bejelentkezés</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="E-mail cím" required>
                    <input type="password" id="login-password" placeholder="Jelszó" required>
                    <button type="submit">Belépés</button>
                </form>
            </div>
        </div>

        <div class="card" style="margin-bottom: 40px;">
            <h2>📝 Új esemény meghirdetése</h2>
            <form id="create-event-form">
                <input type="text" id="title" placeholder="Esemény címe (pl. Nyári Fesztivál)" required>
                <input type="text" id="description" placeholder="Részletes leírás (opcionális)">
                <div style="display: flex; gap: 15px;">
                    <input type="datetime-local" id="event_date" required style="flex: 1;">
                    <input type="number" id="capacity" placeholder="Kapacitás (fő)" required min="1" style="flex: 1;">
                </div>
                <button type="submit">Küldés jóváhagyásra</button>
            </form>
        </div>

        <div id="admin-panel" class="hidden">
            <h2 style="color: #dd6b20;">⚡ Jóváhagyásra váró események (Admin Panel)</h2>
            <div id="pending-events-container" class="events-grid" style="margin-bottom: 40px;"></div>
            <div style="height: 2px; background: #e2e8f0; margin-bottom: 30px;"></div>
        </div>

        <h2>🌐 Aktuális, jóváhagyott események</h2>
        <div id="events-container" class="events-grid"></div>
    </div>

    <script>
        // --- CSERÉLD KI A TE RENDER LINKEDRE! ---
        const API_URL = 'https://esemenykezelo-api-r8ex.onrender.com/api';

        function toggleAdminCode() {
            const role = document.getElementById('reg-role').value;
            const codeInput = document.getElementById('reg-admin-code');
            if (role === 'admin') codeInput.classList.remove('hidden');
            else codeInput.classList.add('hidden');
        }

        function checkLoginState() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            
            const userInfo = document.getElementById('user-info');
            const authSection = document.getElementById('auth-section');
            const adminPanel = document.getElementById('admin-panel');

            if (token) {
                authSection.style.display = 'none';
                userInfo.style.display = 'flex';
                userInfo.classList.remove('hidden');
                document.getElementById('welcome-text').innerHTML = `Sikeresen bejelentkezve! Jogosultság: <strong>${role.toUpperCase()}</strong>`;
                
                if (role === 'admin') {
                    adminPanel.classList.remove('hidden');
                    loadPendingEvents(); 
                } else {
                    adminPanel.classList.add('hidden');
                }
            } else {
                authSection.style.display = 'flex';
                userInfo.classList.add('hidden');
                adminPanel.classList.add('hidden');
            }
            loadEvents();
        }

        function logout() {
            localStorage.clear();
            checkLoginState();
        }

        function loadEvents() {
            fetch(`${API_URL}/events`)
                .then(res => res.json())
                .then(data => renderEvents(data, 'events-container', false));
        }

        function loadPendingEvents() {
            fetch(`${API_URL}/events/pending`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            })
            .then(res => res.json())
            .then(data => renderEvents(data, 'pending-events-container', true));
        }

        function renderEvents(data, containerId, isPending) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 
            const role = localStorage.getItem('role');
            
            data.forEach((event, index) => {
                const card = document.createElement('div');
                card.className = isPending ? 'card pending' : 'card';
                // Enyhe csúsztatás az animációban, hogy lépcsőzetesen jelenjenek meg
                card.style.animationDelay = `${index * 0.1}s`;
                
                let html = `
                    <h3 style="margin-top: 0; color: #2d3748;">${event.title}</h3>
                    <p style="color: #718096; font-size: 0.95rem;"><strong>📅 Dátum:</strong> ${event.event_date.replace('T', ' ')}</p>
                    <p style="color: #718096; font-size: 0.95rem;"><strong>👥 Férőhely:</strong> ${event.capacity} fő</p>
                    
                    <button class="btn-info" onclick="toggleDetails(${event.id})">Részletek mutatása</button>
                    <div id="details-${event.id}" class="hidden details-box">
                        ${event.description || '<i>Nincs megadva részletes leírás ehhez az eseményhez.</i>'}
                    </div>
                `;

                if (isPending && role === 'admin') {
                    html += `<button class="btn-success" onclick="approveEvent(${event.id})">✅ Engedélyezés</button>`;
                }
                
                if (role === 'admin') {
                    html += `<button class="btn-danger" onclick="deleteEvent(${event.id})">🗑️ Törlés</button>`;
                }

                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        function toggleDetails(id) {
            const detailsDiv = document.getElementById(`details-${id}`);
            detailsDiv.classList.toggle('hidden');
        }

        function approveEvent(id) {
            fetch(`${API_URL}/events/${id}/approve`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            }).then(() => {
                loadEvents();
                loadPendingEvents();
            });
        }

        function deleteEvent(id) {
            if (!confirm('Biztosan törlöd ezt az eseményt véglegesen?')) return;
            fetch(`${API_URL}/events/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            }).then(() => {
                loadEvents();
                if(localStorage.getItem('role') === 'admin') loadPendingEvents();
            });
        }

        document.getElementById('create-event-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const newEvent = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                event_date: document.getElementById('event_date').value,
                capacity: document.getElementById('capacity').value
            };
            fetch(`${API_URL}/events`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newEvent)
            }).then(res => res.json()).then(resData => {
                alert(resData.message);
                this.reset();
                if(localStorage.getItem('role') === 'admin') loadPendingEvents();
            });
        });

        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value,
                role: document.getElementById('reg-role').value,
                adminCode: document.getElementById('reg-admin-code').value 
            };
            fetch(`${API_URL}/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
                .then(res => res.json()).then(resData => { 
                    alert(resData.error || resData.message); 
                    if(!resData.error) {
                        this.reset();
                        document.getElementById('reg-admin-code').classList.add('hidden');
                    }
                });
        });

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = { email: document.getElementById('login-email').value, password: document.getElementById('login-password').value };
            fetch(`${API_URL}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
                .then(res => res.json()).then(resData => {
                    if (resData.error) alert(resData.error);
                    else { 
                        localStorage.setItem('token', resData.token); 
                        localStorage.setItem('role', resData.role); 
                        this.reset(); 
                        checkLoginState(); 
                    }
                });
        });

        // Inicializálás
        checkLoginState();
    </script>
</body>
</html>
